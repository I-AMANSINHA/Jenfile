services:
  jenkins:
    image: jenkins/jenkins:lts-jdk17
    container_name: jenkins_server
    restart: unless-stopped
    volumes:
      - ./jenkins_home:/var/jenkins_home
    networks:
      - internal_net
    ports:
      - "9091:8080"

  nginx:
    image: nginx:alpine
    container_name: nginx_server
    restart: unless-stopped
    ports:
      - "9090:80"              
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - internal_net
    depends_on:
      - jenkins

networks:
  internal_net:
    driver: bridge

